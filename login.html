<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Atlantic City</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <h2 style="color:#d4af37;">Atlantic City</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
            <li><a href="login.html">Inicio de Sesión</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="card" style="width:400px;">
            <h2 style="text-align:center;">Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" id="usuario" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="clave" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">Ingresar</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
