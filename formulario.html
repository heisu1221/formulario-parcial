<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión - Atlantic City</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <h2>Atlantic City</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre-nosotros.html">Sobre Nosotros</a></li>
            <li><a href="login.html">Inicio de Sesión</a></li>
        </ul>
    </nav>

    <main>

        <div class="container">

            <section class="card">
                <h2>Registrar Cliente</h2>
                <form id="clienteForm">

                    <div class="row">
                        <div class="input-group">
                            <label>DNI *</label>
                            <input type="text" id="dni" placeholder="Ingrese DNI (8 números, sin espacios)">
                        </div>

                        <div class="input-group">
                            <label>Nombre *</label>
                            <input type="text" id="nombre" placeholder="Nombre completo (mínimo 3 letras)">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Edad *</label>
                        <input type="number" id="edad" placeholder="Debe ser mayor o igual a 18 años">
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Teléfono</label>
                            <input type="text" id="telefono" placeholder="987654321 (9 dígitos, sin espacios)">
                        </div>

                        <div class="input-group">
                            <label>Correo</label>
                            <input type="email" id="correo" placeholder="correo@ejemplo.com (formato válido)">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Guardar</button>
                </form>

                <hr>

                <h3>Clientes Registrados</h3>
                <div id="listaClientes"></div>

            </section>

            <section class="card">
                <h2>Registro de Quejas</h2>

                <form id="quejaForm">
                    <div class="input-group">
                        <label>Cliente *</label>
                        <input type="text" id="clienteQueja" placeholder="Ingrese DNI o nombre del cliente registrado">
                    </div>

                    <div class="input-group">
                        <label>Motivo *</label>
                        <input type="text" id="motivo" placeholder="Motivo principal de la queja (obligatorio)">
                    </div>

                    <div class="input-group">
                        <label>Descripción</label>
                        <textarea id="descripcion" placeholder="Detalles adicionales del caso (opcional)"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Registrar</button>
                </form>

                <hr>

                <h3>Casos Registrados</h3>
                <div id="listaQuejas"></div>

            </section>

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
